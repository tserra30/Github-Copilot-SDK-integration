name: Build Patched SDK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-sdk.yml'
      - 'patches/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  build-sdk:
    name: Build github-copilot-sdk with protocol v3 support
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build wheel

      - name: Download SDK 0.1.22 source
        run: |
          mkdir -p /tmp/sdk-build
          cd /tmp/sdk-build
          pip download --no-binary :all: --no-deps github-copilot-sdk==0.1.22
          tar -xzf github_copilot_sdk-0.1.22.tar.gz
          cd github_copilot_sdk-0.1.22
          echo "SDK source downloaded and extracted"

      - name: Patch SDK for protocol v3 support
        run: |
          cd /tmp/sdk-build/github_copilot_sdk-0.1.22

          # Patch 1: Update SDK_PROTOCOL_VERSION to 3
          sed -i 's/SDK_PROTOCOL_VERSION = 2/SDK_PROTOCOL_VERSION = 3/' copilot/sdk_protocol_version.py

          # Verify Patch 1 applied
          if ! grep -q "SDK_PROTOCOL_VERSION = 3" copilot/sdk_protocol_version.py; then
            echo "ERROR: Patch 1 failed - SDK_PROTOCOL_VERSION was not updated to 3"
            exit 1
          fi
          echo "Patch 1 verified: SDK_PROTOCOL_VERSION = 3"

          # Patch 2: Make protocol check accept both v2 and v3
          # Change strict equality to range check
          python3 -c '
          import sys

          # Read the client.py file
          with open("copilot/client.py", "r") as f:
              content = f.read()

          old_check = """        if server_version != expected_version:
                      raise RuntimeError(
                          f"SDK protocol version mismatch: SDK expects version {expected_version}, "
                          f"but server reports version {server_version}. "
                          f"Please update your SDK or server to ensure compatibility."
                      )"""

          new_check = """        # Accept protocol v2 and v3 (backward compatible)
                  if server_version not in [2, 3]:
                      raise RuntimeError(
                          f"SDK protocol version mismatch: SDK supports versions 2 and 3, "
                          f"but server reports version {server_version}. "
                          f"Please update your SDK or server to ensure compatibility."
                      )"""

          if old_check not in content:
              print("ERROR: old protocol check pattern not found in client.py - patch cannot be applied")
              sys.exit(1)

          content = content.replace(old_check, new_check)

          # Write back
          with open("copilot/client.py", "w") as f:
              f.write(content)

          print("Patch 2 applied: protocol check updated")
          '

          # Verify Patch 2 applied
          if ! grep -q "server_version not in \[2, 3\]" copilot/client.py; then
            echo "ERROR: Patch 2 failed - protocol range check not found in client.py"
            exit 1
          fi
          echo "Patch 2 verified: protocol range check present"

          # Update version to indicate it's patched (fail if version line not found)
          if ! grep -q 'version = "0.1.22"' pyproject.toml; then
            echo "ERROR: version string not found in pyproject.toml - cannot bump version"
            exit 1
          fi
          sed -i 's/version = "0.1.22"/version = "0.1.22+ha"/' pyproject.toml
          echo "Version bumped to 0.1.22+ha"

          echo "All patches applied and verified successfully"

      - name: Build universal wheel
        run: |
          cd /tmp/sdk-build/github_copilot_sdk-0.1.22
          python -m build --wheel
          ls -lh dist/

          # Remove old wheels from repository to avoid conflicts
          rm -f $GITHUB_WORKSPACE/wheels/*.whl

          # Copy new wheel to repository
          mkdir -p $GITHUB_WORKSPACE/wheels
          cp dist/*.whl $GITHUB_WORKSPACE/wheels/

          echo "Built wheel:"
          ls -lh $GITHUB_WORKSPACE/wheels/

          # Verify wheel filename and version
          wheel_file=$(ls $GITHUB_WORKSPACE/wheels/*.whl)
          if [[ ! "$wheel_file" =~ github_copilot_sdk-0\.1\.22\+ha-py3-none-any\.whl$ ]]; then
            echo "ERROR: Expected wheel filename to match 'github_copilot_sdk-0.1.22+ha-py3-none-any.whl' but got: $(basename $wheel_file)"
            exit 1
          fi
          echo "Wheel filename verified: $(basename $wheel_file)"

      - name: Commit and push wheel
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Add wheels directory (already tracked, just update it)
          git add wheels/

          # Check if there are changes to commit
          if git diff --cached --quiet; then
            echo "No changes to commit - wheel is up to date"
          else
            BRANCH="bot/update-sdk-wheel-$(date +%Y%m%d%H%M%S)"
            git checkout -b "$BRANCH"
            git commit \
              -m "Update patched github-copilot-sdk wheel with protocol v3 support" \
              -m "Built from SDK 0.1.22 source with patches:" \
              -m "- Update SDK_PROTOCOL_VERSION to 3" \
              -m "- Accept both protocol v2 and v3 for backward compatibility" \
              -m "- Universal py3-none-any wheel compatible with Home Assistant OS" \
              -m "Wheel: github_copilot_sdk-0.1.22+ha-py3-none-any.whl"

            echo "Wheel committed to repository"

            git push origin "HEAD:refs/heads/$BRANCH"
            echo "Changes pushed to branch $BRANCH"

            printf 'Automated PR: rebuilt patched SDK wheel from 0.1.22 source with protocol v3 support.\n\nChanges:\n- Update SDK_PROTOCOL_VERSION to 3\n- Accept both protocol v2 and v3 for backward compatibility\n- Universal py3-none-any wheel compatible with Home Assistant OS\n' > /tmp/pr_body.md

            gh pr create \
              --title "Update patched github-copilot-sdk wheel with protocol v3 support" \
              --body-file /tmp/pr_body.md \
              --base main \
              --head "$BRANCH"
            echo "Pull request created"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
